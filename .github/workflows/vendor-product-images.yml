name: vendor-product-images
on: workflow_dispatch
permissions:
  contents: write
jobs:
  vendor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p img
          curl -fsSL -o img/product-308-main.jpg "https://accurate-mag.com/wp-content/uploads/2018/03/IMG_4916-700x806.jpg"
          curl -fsSL -o img/product-308-alt.jpg "https://accurate-mag.com/wp-content/uploads/2018/03/IMG_4915-700x525.jpg"
      - run: |
          git config user.name "vendor-bot"
          git config user.email "vendor@users.noreply.github.com"
          git add img
          git commit -m "Vendor product photography" || echo "nothing to commit"
          git push
