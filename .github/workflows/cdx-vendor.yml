name: cdx-vendor
on: workflow_dispatch
permissions:
  contents: write
jobs:
  vendor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 << 'PY'
          import urllib.request, json, os, time
          os.makedirs("img", exist_ok=True)
          report=[]
          def cdx(url, extra=""):
              q=f"https://web.archive.org/cdx/search/cdx?url={url}&output=json&filter=statuscode:200&fl=timestamp,original{extra}"
              try:
                  with urllib.request.urlopen(q, timeout=30) as r:
                      rows=json.load(r)
                      return rows[1:] if len(rows)>1 else []
              except Exception as e:
                  report.append(f"CDX error {url}: {e}"); return []
          def grab(out, paths):
              for p in paths:
                  for ts, orig in cdx(p)[:3]:
                      u=f"https://web.archive.org/web/{ts}id_/{orig}"
                      try:
                          with urllib.request.urlopen(u, timeout=60) as r:
                              data=r.read()
                          if data[:2]==b"\xff\xd8":
                              open(f"img/{out}","wb").write(data)
                              report.append(f"OK {out} <- {u} ({len(data)}B)")
                              return True
                          report.append(f"not-jpeg {out} <- {u}")
                      except Exception as e:
                          report.append(f"fetch-fail {out} {u}: {e}")
                      time.sleep(1)
              report.append(f"MISS {out}: no archived copy found")
              return False
          targets=[
            ("amsr-main.jpg",["accurate-mag.com/wp-content/uploads/2022/02/4321-1-700x525.jpg","accurate-mag.com/wp-content/uploads/2022/02/4321-1-scaled.jpg","accurate-mag.com/wp-content/uploads/2022/02/4321-1.jpg"]),
            ("amsr-alt.jpg",["accurate-mag.com/wp-content/uploads/2022/02/IMG_4322-700x463.jpg","accurate-mag.com/wp-content/uploads/2022/02/IMG_4322-scaled.jpg","accurate-mag.com/wp-content/uploads/2022/02/IMG_4322.jpg"]),
            ("chassis-ultralite.jpg",["accurate-mag.com/wp-content/uploads/2024/01/ULF-White-2-700x525.jpg","accurate-mag.com/wp-content/uploads/2024/01/ULF-White-2.jpg"]),
            ("chassis-ultralite-alt.jpg",["accurate-mag.com/wp-content/uploads/2024/01/ULF-White12-700x525.jpg","accurate-mag.com/wp-content/uploads/2024/01/ULF-White12.jpg"]),
          ]
          ok={out: grab(out,paths) for out,paths in targets}
          report.append("\n=== ARCHIVED JPEG INVENTORY (substitutes) ===")
          for prefix in ["accurate-mag.com/wp-content/uploads/2022/*","accurate-mag.com/wp-content/uploads/2024/*","accurate-mag.com/wp-content/uploads/2018/*"]:
              rows=cdx(prefix,"&matchType=glob&filter=mimetype:image/jpeg&collapse=urlkey&limit=150")
              report.append(f"\n-- {prefix}: {len(rows)} archived")
              for ts,orig in rows: report.append(f"{ts} {orig}")
          open("vendor-report.txt","w").write("\n".join(report))
          print("\n".join(report[:12]))
          PY
      - run: |
          git config user.name "vendor-bot"
          git config user.email "vendor@users.noreply.github.com"
          for f in amsr-main.jpg amsr-alt.jpg chassis-ultralite.jpg chassis-ultralite-alt.jpg; do
            file "img/$f" | grep -q "JPEG" && git add "img/$f" || echo "skip $f"
          done
          git add vendor-report.txt
          git commit -m "CDX vendor pass" && git push
