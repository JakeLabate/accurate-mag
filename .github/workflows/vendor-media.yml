name: vendor-media
on: workflow_dispatch
permissions:
  contents: write
jobs:
  vendor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p img
          curl -fsSL -o img/amsr-main.jpg "https://accurate-mag.com/wp-content/uploads/2022/02/4321-1-700x525.jpg"
          curl -fsSL -o img/amsr-alt.jpg "https://accurate-mag.com/wp-content/uploads/2022/02/IMG_4322-700x463.jpg"
          curl -fsSL -o img/chassis-ultralite.jpg "https://accurate-mag.com/wp-content/uploads/2024/01/ULF-White-2-700x525.jpg"
          curl -fsSL -o img/chassis-ultralite-alt.jpg "https://accurate-mag.com/wp-content/uploads/2024/01/ULF-White12-700x525.jpg"
      - run: |
          git config user.name "vendor-bot"
          git config user.email "vendor@users.noreply.github.com"
          git add img && git commit -m "Vendor product media" || echo "nothing to commit"
          git push
